model:
  name: "unsloth/Llama-3.2-1B-Instruct"
  load_in_4bit: true

lora:
  r: 16
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_alpha: 16
  lora_dropout: 0

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  max_steps: 60
  learning_rate: 2.0e-4